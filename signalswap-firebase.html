<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SignalSwap — used tech marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/@tabler/icons-webfont/2.47.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --bg:#0A0E14; --panel:#12161F; --panel2:#161B26; --border:#232B38; --border-hi:#333E52;
    --text:#E7ECF3; --text-dim:#8792A3; --text-faint:#5A6478;
    --accent:#6C63FF; --accent-dim:#4A44B0;
    --signal:#00D9A6; --warn:#FFB020; --danger:#FF5C5C;
    --mono:'JetBrains Mono',monospace; --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh}
  ::selection{background:var(--accent-dim)}
  a{color:var(--accent);text-decoration:none}
  button{font-family:var(--body);cursor:pointer;border:none;background:none;color:var(--text)}
  input,select,textarea{font-family:var(--body);background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}

  .ticker-wrap{background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap;padding:7px 0}
  .ticker{display:inline-block;padding-left:100%;animation:scroll 28s linear infinite;font-family:var(--mono);font-size:12px;color:var(--text-dim)}
  .ticker span{margin-right:36px}
  .ticker .up{color:var(--signal)}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

  header{display:flex;align-items:center;gap:20px;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,14,20,0.95);backdrop-filter:blur(6px);z-index:10}
  .logo{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 3px rgba(0,217,166,0.15)}
  .search{flex:1;max-width:480px;display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
  .search input{background:none;border:none;padding:0;flex:1;font-size:14px;color:var(--text)}
  .search input:focus{border:none}
  .search i{color:var(--text-faint)}
  .navbtn{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text)}
  .navbtn:hover{border-color:var(--border-hi);background:var(--panel2)}
  .navbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
  .navbtn.primary:hover{background:#7d75ff}
  .cartbtn{position:relative}
  .cartcount{position:absolute;top:-6px;right:-6px;background:var(--signal);color:#02291f;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px;font-family:var(--mono)}

  .chips{display:flex;gap:8px;padding:14px 28px;overflow-x:auto;border-bottom:1px solid var(--border)}
  .chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-dim);white-space:nowrap}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip:hover{border-color:var(--border-hi)}

  main{padding:24px 28px 60px;max-width:1200px;margin:0 auto}
  .section-title{font-family:var(--disp);font-size:15px;color:var(--text-dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:var(--border-hi)}
  .card-icon{width:100%;height:100px;background:var(--panel2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--accent);margin-bottom:12px}
  .card-title{font-size:14px;font-weight:500;margin-bottom:6px;line-height:1.3}
  .spec-strip{font-family:var(--mono);font-size:11px;color:var(--text-faint);background:var(--panel2);border-radius:6px;padding:6px 8px;margin-bottom:10px;line-height:1.6}
  .spec-strip div{display:flex;justify-content:space-between}
  .spec-strip .k{color:var(--text-faint)}
  .spec-strip .v{color:var(--text-dim)}
  .card-bottom{display:flex;justify-content:space-between;align-items:center}
  .price{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--signal)}
  .badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
  .badge.new{background:rgba(0,217,166,0.12);color:var(--signal)}
  .badge.used{background:rgba(255,176,32,0.12);color:var(--warn)}
  .badge.sold{background:rgba(255,92,92,0.12);color:var(--danger)}
  .seller-row{font-size:11px;color:var(--text-faint);margin-top:8px;display:flex;justify-content:space-between}

  .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100}
  .drawer-overlay.open{display:flex;justify-content:flex-end}
  .drawer{width:380px;max-width:90vw;background:var(--bg);border-left:1px solid var(--border);height:100vh;overflow-y:auto;padding:24px}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{width:480px;max-width:92vw;max-height:88vh;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px}
  .row-close{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .row-close h2{font-family:var(--disp);font-size:18px}
  .field{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--text-dim)}
  .field input,.field select,.field textarea{width:100%}
  .field textarea{resize:vertical;min-height:70px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
  .cart-item .ci-icon{width:48px;height:48px;background:var(--panel2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
  .cart-item .ci-info{flex:1}
  .qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:4px}
  .qty-ctrl button{width:22px;height:22px;border:1px solid var(--border);border-radius:4px;font-size:13px;line-height:1}
  .empty{color:var(--text-faint);font-size:13px;text-align:center;padding:40px 0}
  .cart-total{display:flex;justify-content:space-between;padding:14px 0;font-family:var(--mono);font-size:15px}
  .order{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
  .order-head{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--text-faint);margin-bottom:8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--signal);color:#02291f;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;display:none}
  .detail-top{display:flex;gap:20px;margin-bottom:16px}
  .detail-icon{width:140px;height:140px;background:var(--panel2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--accent);flex-shrink:0}
  .desc{font-size:13px;color:var(--text-dim);line-height:1.6;margin:14px 0}
  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
</style>
</head>
<body>

<div id="setupBanner" style="display:none;background:var(--warn);color:#412402;padding:10px 20px;font-size:13px;font-family:var(--mono);text-align:center">
  Firebase config not set — open this file's source and fill in your project keys near the top of the &lt;script&gt; tag.
</div>
<div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>

<header>
  <div class="logo"><span class="dot"></span>signalswap</div>
  <div class="search"><i class="ti ti-search"></i><input id="searchInput" placeholder="Search laptops, GPUs, peripherals..."></div>
  <button class="navbtn" id="ordersBtn"><i class="ti ti-package"></i>Orders</button>
  <button class="navbtn cartbtn" id="cartBtn"><i class="ti ti-shopping-cart"></i>Cart<span class="cartcount" id="cartCount" style="display:none">0</span></button>
  <button class="navbtn primary" id="sellBtn"><i class="ti ti-plus"></i>Sell an item</button>
</header>

<div class="chips" id="chips"></div>

<main>
  <div class="section-title" id="listTitle"><i class="ti ti-cpu"></i>All listings</div>
  <div class="grid" id="grid"></div>
</main>

<div class="modal-overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<div class="modal-overlay" id="sellOverlay">
  <div class="modal">
    <div class="row-close"><h2>Sell an item</h2><button onclick="closeSell()"><i class="ti ti-x"></i></button></div>
    <div class="field"><label>Title</label><input id="f_title" placeholder="Dell XPS 15 workstation laptop"></div>
    <div class="two-col">
      <div class="field"><label>Category</label>
        <select id="f_category">
          <option>Laptops</option><option>Desktops/Workstations</option><option>Components</option>
          <option>Peripherals</option><option>Audio</option><option>Networking</option><option>Phones</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Condition</label>
        <select id="f_condition"><option>New</option><option>Used - Like New</option><option>Used - Good</option><option>Used - Fair</option></select>
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Price (USD)</label><input id="f_price" type="number" placeholder="450"></div>
      <div class="field"><label>Stock</label><input id="f_stock" type="number" value="1"></div>
    </div>
    <div class="field"><label>Specs (comma separated, e.g. CPU: i7-12700H, RAM: 16GB, GPU: RTX 3060)</label><input id="f_specs" placeholder="CPU: i7-12700H, RAM: 16GB, GPU: RTX 3060"></div>
    <div class="field"><label>Description</label><textarea id="f_desc" placeholder="Condition details, accessories included, reason for selling..."></textarea></div>
    <div class="field"><label>Seller name</label><input id="f_seller" placeholder="your name"></div>
    <button class="navbtn primary" style="width:100%;justify-content:center;padding:11px" onclick="submitListing()">List item</button>
  </div>
</div>

<div class="drawer-overlay" id="cartOverlay">
  <div class="drawer">
    <div class="row-close"><h2>Your cart</h2><button onclick="closeCart()"><i class="ti ti-x"></i></button></div>
    <div id="cartItems"></div>
    <div id="cartFooter"></div>
  </div>
</div>

<div class="drawer-overlay" id="ordersOverlay">
  <div class="drawer">
    <div class="row-close"><h2>Order history</h2><button onclick="closeOrders()"><i class="ti ti-x"></i></button></div>
    <div id="ordersList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- Firebase setup ----
// 1. Go to https://console.firebase.google.com -> Add project (free tier is fine)
// 2. Once created, click the </> (web) icon to register a web app
// 3. Copy the firebaseConfig object it gives you and paste it below
// 4. In the left sidebar go to Build -> Firestore Database -> Create database (start in test mode)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db = null;
const configIsPlaceholder = firebaseConfig.apiKey === "YOUR_API_KEY";
if(!configIsPlaceholder){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} else {
  document.getElementById('setupBanner').style.display = 'block';
}

const CATEGORY_ICON = {
  "Laptops":"ti-device-laptop","Desktops/Workstations":"ti-device-desktop","Components":"ti-cpu",
  "Peripherals":"ti-mouse","Audio":"ti-headphones","Networking":"ti-router","Phones":"ti-device-mobile","Other":"ti-box"
};
const CATEGORIES = ["All","Laptops","Desktops/Workstations","Components","Peripherals","Audio","Networking","Phones","Other"];

let listings = [];
let activeCategory = "All";
let searchTerm = "";

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 2200);
}
function money(n){ return '$' + Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }

async function seedIfNeeded(){
  if(!db) return;
  const snap = await db.collection('listings').limit(1).get();
  if(snap.empty){
    const seed = [
      {title:"ThinkPad X1 Carbon Gen 9", category:"Laptops", condition:"Used - Good", price:520, stock:2,
       specs:["CPU: i7-1165G7","RAM: 16GB","Storage: 512GB SSD"], description:"Reliable business laptop, great for coding and light 3D work. Battery holds ~6hrs.", seller:"tradewind_tech"},
      {title:"Custom Ryzen 5800X workstation", category:"Desktops/Workstations", condition:"Used - Like New", price:780, stock:1,
       specs:["CPU: Ryzen 7 5800X","GPU: RTX 3070","RAM: 32GB"], description:"Built for rendering and AI model training, barely used. Includes case and PSU.", seller:"circuitforge"},
      {title:"RTX 3060 12GB graphics card", category:"Components", condition:"Used - Good", price:240, stock:3,
       specs:["VRAM: 12GB","Interface: PCIe 4.0"], description:"Pulled from a low-mileage build, no mining history. Great entry GPU for AI inference.", seller:"partbin_dave"},
      {title:"Mechanical keyboard, hot-swap", category:"Peripherals", condition:"New", price:65, stock:8,
       specs:["Switches: Brown","Layout: 75%"], description:"Unopened, gasket mount, hot-swappable sockets.", seller:"keycap_kev"},
      {title:"Audio-Technica ATH-M50x", category:"Audio", condition:"Used - Like New", price:90, stock:2,
       specs:["Type: Closed-back","Impedance: 38ohm"], description:"Studio monitoring headphones, light use, original case included.", seller:"soundwell"},
      {title:"Netgear Nighthawk AX12 router", category:"Networking", condition:"Used - Good", price:150, stock:1,
       specs:["WiFi: 6 (AX)","Ports: 5x gigabit"], description:"Great for home labs or multi-device households.", seller:"packetpusher"},
      {title:"Pixel 8 Pro, unlocked", category:"Phones", condition:"Used - Good", price:430, stock:1,
       specs:["Storage: 256GB","Battery health: 91%"], description:"Minor scuff on frame, screen flawless, comes with case.", seller:"mobly_resale"},
      {title:"Wacom Intuos Pro medium", category:"Other", condition:"Used - Like New", price:140, stock:2,
       specs:["Active area: 8.7x5.8in","Pen: included"], description:"Ideal for digital art and animation work, barely used pen tips.", seller:"inkwell_studio"}
    ];
    const batch = db.batch();
    for(const s of seed){
      const id = 'seed_' + Math.random().toString(36).slice(2,9);
      batch.set(db.collection('listings').doc(id), {...s, id, createdAt: Date.now()});
    }
    await batch.commit();
  }
}

async function loadListings(){
  if(!db){ listings = []; renderTicker(); renderGrid(); return; }
  const snap = await db.collection('listings').orderBy('createdAt','desc').get();
  listings = snap.docs.map(d => d.data());
  renderTicker();
  renderGrid();
}

function renderTicker(){
  const el = document.getElementById('ticker');
  if(listings.length === 0){ el.innerHTML = ''; return; }
  el.innerHTML = listings.slice(0,12).map(l =>
    `<span><i class="ti ti-bolt" style="color:var(--signal)"></i> ${escapeHtml(l.title)} <span class="up">${money(l.price)}</span></span>`
  ).join('');
}

function renderChips(){
  const el = document.getElementById('chips');
  el.innerHTML = CATEGORIES.map(c =>
    `<button class="chip ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}
function setCategory(c){ activeCategory = c; renderChips(); renderGrid(); }

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderGrid(){
  let items = listings;
  if(activeCategory !== "All") items = items.filter(l => l.category === activeCategory);
  if(searchTerm.trim()){
    const t = searchTerm.toLowerCase();
    items = items.filter(l => l.title.toLowerCase().includes(t) || l.category.toLowerCase().includes(t));
  }
  const grid = document.getElementById('grid');
  document.getElementById('listTitle').innerHTML = `<i class="ti ti-cpu"></i>${activeCategory === "All" ? "All listings" : activeCategory} — ${items.length} found`;
  if(items.length === 0){ grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No listings match. Try another search or category.</div>'; return; }
  grid.innerHTML = items.map(l => {
    const sold = (l.stock||0) <= 0;
    const badgeClass = sold ? 'sold' : (l.condition === 'New' ? 'new' : 'used');
    const badgeText = sold ? 'sold out' : l.condition;
    const specs = (l.specs||[]).slice(0,3).map(s => {
      const [k,...rest] = s.split(':');
      return `<div><span class="k">${escapeHtml(k.trim())}</span><span class="v">${escapeHtml(rest.join(':').trim())}</span></div>`;
    }).join('');
    return `<div class="card" onclick="openDetail('${l.id}')">
      <div class="card-icon"><i class="ti ${CATEGORY_ICON[l.category]||'ti-box'}"></i></div>
      <div class="card-title">${escapeHtml(l.title)}</div>
      <div class="spec-strip">${specs}</div>
      <div class="card-bottom">
        <span class="price">${money(l.price)}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="seller-row"><span>@${escapeHtml(l.seller||'anon')}</span><span>${l.stock||0} in stock</span></div>
    </div>`;
  }).join('');
}

function openDetail(id){
  const l = listings.find(x => x.id === id);
  if(!l) return;
  const sold = (l.stock||0) <= 0;
  const specs = (l.specs||[]).map(s => {
    const [k,...rest] = s.split(':');
    return `<div><span class="k">${escapeHtml(k.trim())}</span><span class="v">${escapeHtml(rest.join(':').trim())}</span></div>`;
  }).join('');
  document.getElementById('detailModal').innerHTML = `
    <div class="row-close"><h2>Listing detail</h2><button onclick="closeDetail()"><i class="ti ti-x"></i></button></div>
    <div class="detail-top">
      <div class="detail-icon"><i class="ti ${CATEGORY_ICON[l.category]||'ti-box'}"></i></div>
      <div>
        <div class="card-title" style="font-size:17px;margin-bottom:8px">${escapeHtml(l.title)}</div>
        <div class="price" style="font-size:22px">${money(l.price)}</div>
        <div class="seller-row" style="margin-top:8px">seller: @${escapeHtml(l.seller||'anon')} · ${l.stock||0} in stock</div>
      </div>
    </div>
    <div class="spec-strip">${specs}</div>
    <div class="desc">${escapeHtml(l.description||'No description provided.')}</div>
    <button class="navbtn primary" style="width:100%;justify-content:center;padding:11px" ${sold?'disabled':''} onclick="addToCart('${l.id}')">
      <i class="ti ti-shopping-cart-plus"></i>${sold?'Sold out':'Add to cart'}
    </button>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }

async function getCart(){
  try{ const raw = localStorage.getItem('signalswap_cart'); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}
async function setCart(cart){ localStorage.setItem('signalswap_cart', JSON.stringify(cart)); }

async function addToCart(id){
  const cart = await getCart();
  const existing = cart.find(c => c.listingId === id);
  if(existing) existing.qty += 1; else cart.push({listingId:id, qty:1});
  await setCart(cart);
  toast('Added to cart');
  closeDetail();
  renderCartCount();
}

async function renderCartCount(){
  const cart = await getCart();
  const count = cart.reduce((s,c)=>s+c.qty,0);
  const el = document.getElementById('cartCount');
  if(count > 0){ el.style.display='inline-block'; el.textContent = count; } else { el.style.display='none'; }
}

async function openCart(){
  const cart = await getCart();
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if(cart.length === 0){ container.innerHTML = '<div class="empty">Your cart is empty.</div>'; footer.innerHTML=''; document.getElementById('cartOverlay').classList.add('open'); return; }
  let total = 0;
  container.innerHTML = cart.map(c => {
    const l = listings.find(x => x.id === c.listingId);
    if(!l) return '';
    total += l.price * c.qty;
    return `<div class="cart-item">
      <div class="ci-icon"><i class="ti ${CATEGORY_ICON[l.category]||'ti-box'}"></i></div>
      <div class="ci-info">
        <div class="card-title">${escapeHtml(l.title)}</div>
        <div class="price" style="font-size:14px">${money(l.price)}</div>
        <div class="qty-ctrl">
          <button onclick="changeQty('${l.id}',-1)">-</button>
          <span style="font-family:var(--mono);font-size:13px">${c.qty}</span>
          <button onclick="changeQty('${l.id}',1)">+</button>
          <button style="margin-left:10px;color:var(--danger);font-size:12px" onclick="removeFromCart('${l.id}')">remove</button>
        </div>
      </div>
    </div>`;
  }).join('');
  footer.innerHTML = `<div class="cart-total"><span>Total</span><span>${money(total)}</span></div>
    <button class="navbtn primary" style="width:100%;justify-content:center;padding:11px" onclick="checkout()"><i class="ti ti-lock"></i>Checkout</button>`;
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart(){ document.getElementById('cartOverlay').classList.remove('open'); }

async function changeQty(id, delta){
  const cart = await getCart();
  const item = cart.find(c => c.listingId === id);
  if(!item) return;
  item.qty += delta;
  const filtered = cart.filter(c => c.qty > 0);
  await setCart(filtered);
  openCart();
  renderCartCount();
}
async function removeFromCart(id){
  const cart = await getCart();
  await setCart(cart.filter(c => c.listingId !== id));
  openCart();
  renderCartCount();
}

async function checkout(){
  const cart = await getCart();
  if(cart.length === 0) return;
  const orderItems = [];
  for(const c of cart){
    const l = listings.find(x => x.id === c.listingId);
    if(!l) continue;
    const newStock = Math.max(0, (l.stock||0) - c.qty);
    if(db) await db.collection('listings').doc(l.id).update({stock: newStock});
    orderItems.push({title:l.title, price:l.price, qty:c.qty});
  }
  const orders = await getOrders();
  orders.unshift({id:'ord_'+Date.now(), items:orderItems, total:orderItems.reduce((s,i)=>s+i.price*i.qty,0), date:new Date().toISOString()});
  localStorage.setItem('signalswap_orders', JSON.stringify(orders));
  await setCart([]);
  renderCartCount();
  closeCart();
  toast('Order placed');
  await loadListings();
}

async function getOrders(){
  try{ const raw = localStorage.getItem('signalswap_orders'); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}
async function openOrders(){
  const orders = await getOrders();
  const el = document.getElementById('ordersList');
  if(orders.length === 0){ el.innerHTML = '<div class="empty">No orders yet.</div>'; }
  else{
    el.innerHTML = orders.map(o => `<div class="order">
      <div class="order-head"><span>${o.id}</span><span>${new Date(o.date).toLocaleDateString()}</span></div>
      ${o.items.map(i => `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${escapeHtml(i.title)} x${i.qty}</span><span>${money(i.price*i.qty)}</span></div>`).join('')}
      <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px"><span>Total</span><span>${money(o.total)}</span></div>
    </div>`).join('');
  }
  document.getElementById('ordersOverlay').classList.add('open');
}
function closeOrders(){ document.getElementById('ordersOverlay').classList.remove('open'); }

function openSell(){ document.getElementById('sellOverlay').classList.add('open'); }
function closeSell(){ document.getElementById('sellOverlay').classList.remove('open'); }

async function submitListing(){
  const title = document.getElementById('f_title').value.trim();
  const price = parseFloat(document.getElementById('f_price').value);
  if(!title || !price){ toast('Add a title and price'); return; }
  const specsRaw = document.getElementById('f_specs').value.trim();
  const specs = specsRaw ? specsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const listing = {
    id: 'lst_' + Math.random().toString(36).slice(2,9),
    title, price,
    category: document.getElementById('f_category').value,
    condition: document.getElementById('f_condition').value,
    stock: parseInt(document.getElementById('f_stock').value) || 1,
    specs,
    description: document.getElementById('f_desc').value.trim(),
    seller: document.getElementById('f_seller').value.trim() || 'anon',
    createdAt: Date.now()
  };
  if(!db){ toast('Add your Firebase config first'); return; }
  await db.collection('listings').doc(listing.id).set(listing);
  toast('Listed! Visible to everyone now.');
  closeSell();
  ['f_title','f_price','f_specs','f_desc','f_seller'].forEach(id => document.getElementById(id).value = '');
  await loadListings();
}

document.getElementById('sellBtn').onclick = openSell;
document.getElementById('cartBtn').onclick = openCart;
document.getElementById('ordersBtn').onclick = openOrders;
document.getElementById('searchInput').oninput = (e) => { searchTerm = e.target.value; renderGrid(); };

renderChips();
seedIfNeeded().then(loadListings).then(renderCartCount);
</script>
</body>
